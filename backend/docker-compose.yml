version: '3.8'
services:
  app:
    build: .
    ports:
      - "7000:7000"
    depends_on:
      - mongo
    environment:
      - MONGO_URL=mongodb://mongo:27017/smartSchedule
    volumes:
      - .:/app
    command: uvicorn app:app --host 0.0.0.0 --port 7000
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
volumes:
  mongo_data: 